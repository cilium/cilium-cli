name: Release Image Build

# Any change in triggers needs to be reflected in the concurrency group.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.after }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.repository == 'cilium/cilium-cli' }}
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      repo_tags: ${{ steps.tag.outputs.repo_tags }}
      digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Getting image tag
        id: tag
        run: |
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "repo_tags=quay.io/${{ github.repository_owner }}/cilium-cli:latest,quay.io/${{ github.repository_owner }}/cilium-cli:${{ github.ref_name }}" >> $GITHUB_OUTPUT

      # SECURITY: Checking out trusted code from a signed tag
      # This workflow only runs on pushed tags to the main repository.
      # Tags should be signed and verified before pushing to ensure code integrity.
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: docker_build
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: false
          tags: quay.io/${{ github.repository_owner }}/cilium-cli:${{ steps.tag.outputs.tag }}
          outputs: type=oci,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  push:
    needs: build
    if: ${{ github.repository == 'cilium/cilium-cli' }}
    runs-on: ubuntu-24.04
    environment: release

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
          path: /tmp

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Push image to registry
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_RELEASE_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_RELEASE_TOKEN }}
        run: |
          for tag in $(echo "${{ needs.build.outputs.repo_tags }}" | tr ',' '\n'); do
            skopeo copy \
              --multi-arch all \
              --dest-creds "${QUAY_USERNAME}:${QUAY_PASSWORD}" \
              oci-archive:/tmp/image.tar \
              "docker://${tag}"
          done
